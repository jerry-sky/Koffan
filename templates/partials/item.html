{{define "partials/item"}}
<div
    id="item-{{.Item.ID}}"
    data-item-id="{{.Item.ID}}"
    data-section-id="{{.Item.SectionID}}"
    class="px-4 py-3 flex items-center gap-0.5 hover:bg-stone-50 dark:hover:bg-stone-700 transition-colors group select-none {{if .Item.Uncertain}}bg-amber-50/50 dark:bg-amber-900/30{{end}}"
    x-show="isItemVisible({{.Item.ID}})"
    @click="if($data.inlineEditingItemId !== {{.Item.ID}} && !$event.target.closest('button, a, input, select')) { $data.startInlineEdit({{.Item.ID}}, {{.Item.SectionID}}, '{{.Item.Name | js}}', '{{.Item.Description | js}}', {{.Item.Quantity}}) }"
>
    <!-- Checkbox -->
    <button
        @click="$data.toggleItem({{.Item.ID}}, {{.Item.SectionID}})"
        class="flex-shrink-0 w-14 h-14 flex items-center justify-center -m-4"
    >
        <span class="w-6 h-6 rounded-full border-2 border-stone-300 dark:border-stone-500 hover:border-pink-400 transition-transform hover:scale-110"></span>
    </button>

    <!-- Content (clickable to edit) -->
    <div
        class="flex-1 min-w-0 ml-2"
        x-show="$data.inlineEditingItemId !== {{.Item.ID}}"
    >
        <div class="flex items-center gap-2">
            {{if .Item.Uncertain}}
            <span class="text-amber-500 dark:text-amber-400 text-xs">?</span>
            {{end}}
            <p class="item-name text-sm text-stone-700 dark:text-stone-200 truncate">{{.Item.Name}}</p>
            {{if gt .Item.Quantity 0}}
            <span class="px-1.5 py-0.5 text-xs font-medium bg-stone-100 dark:bg-stone-700 text-stone-600 dark:text-stone-300 rounded-full flex-shrink-0">{{.Item.Quantity}}x</span>
            {{end}}
        </div>
        {{if .Item.Description}}
        <p class="text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5">{{.Item.Description}}</p>
        {{end}}
    </div>

    <!-- Inline Edit -->
    <div
        class="flex-1 min-w-0 ml-2"
        x-show="$data.inlineEditingItemId === {{.Item.ID}}"
        x-cloak
    >
        <input
            type="text"
            x-model="$data.inlineEditName"
            @keydown.enter.prevent="$data.handleInlineEditEnter({{.Item.ID}}, {{.Item.SectionID}})"
            @keydown.escape="$data.cancelInlineEdit()"
            @blur="$data.handleInlineEditBlur({{.Item.ID}}, {{.Item.SectionID}})"
            class="w-full px-2 py-1 text-sm text-stone-700 dark:text-stone-200 bg-white dark:bg-stone-800 border border-pink-400 rounded focus:outline-none focus:ring-2 focus:ring-pink-400"
            :placeholder="t('items.name')"
        />
    </div>

    <!-- Desktop Actions -->
    <div 
        class="hidden md:flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity"
        x-show="$data.inlineEditingItemId !== {{.Item.ID}}"
    >
        <!-- Uncertain toggle -->
        <button
            @click="$data.toggleUncertainFetch({{.Item.ID}})"
            class="p-1.5 rounded-md hover:bg-stone-100 dark:hover:bg-stone-700 {{if .Item.Uncertain}}text-amber-500{{else}}text-stone-400 dark:text-stone-500{{end}} transition-colors"
            :title="{{if .Item.Uncertain}}t('actions.remove_mark'){{else}}t('actions.mark_uncertain'){{end}}"
        >
            <svg class="w-4 h-4" fill="{{if .Item.Uncertain}}currentColor{{else}}none{{end}}" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </button>

        <!-- Edit -->
        <button
            data-item-id="{{.Item.ID}}"
            data-item-name="{{.Item.Name}}"
            data-item-description="{{.Item.Description}}"
            data-item-quantity="{{.Item.Quantity}}"
            @click="$data.editItem({
                id: parseInt($el.dataset.itemId),
                name: $el.dataset.itemName,
                description: $el.dataset.itemDescription || '',
                quantity: parseInt($el.dataset.itemQuantity) || 0
            })"
            class="p-1.5 rounded-md hover:bg-stone-100 dark:hover:bg-stone-700 text-stone-400 dark:text-stone-500 transition-colors"
            :title="t('common.edit')"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
        </button>

        <!-- Move to section dropdown -->
        <div x-data="{ open: false }" class="relative">
            <button
                @click="open = !open"
                class="p-1.5 rounded-md hover:bg-stone-100 dark:hover:bg-stone-700 text-stone-400 dark:text-stone-500 transition-colors"
                :title="t('actions.move')"
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                </svg>
            </button>
            <div
                x-show="open"
                @click.outside="open = false"
                x-cloak
                x-transition
                class="absolute right-0 mt-1 w-40 bg-white dark:bg-stone-800 rounded-lg shadow-xl border border-stone-200 dark:border-stone-700 z-50 py-1"
            >
                {{range .Sections}}
                {{if ne .ID $.Item.SectionID}}
                <button
                    @click="open = false; $data.moveItemDesktop({{$.Item.ID}}, {{$.Item.SectionID}}, {{.ID}})"
                    class="block w-full text-left px-3 py-1.5 text-sm text-stone-600 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700"
                >
                    {{.Name}}
                </button>
                {{end}}
                {{end}}
            </div>
        </div>

        <!-- Delete -->
        <button
            @click="if(confirm(t('confirm.delete_item', {name: '{{.Item.Name | js}}'}))) { $data.deleteItemDirect({{.Item.ID}}, {{.Item.SectionID}}) }"
            class="p-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/30 text-stone-400 dark:text-stone-500 hover:text-red-500 dark:hover:text-red-400 transition-colors"
            :title="t('common.delete')"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <!-- Mobile Actions Button -->
    <button
        x-show="$data.inlineEditingItemId !== {{.Item.ID}}"
        data-item-id="{{.Item.ID}}"
        data-item-name="{{.Item.Name}}"
        data-item-description="{{.Item.Description}}"
        data-item-quantity="{{.Item.Quantity}}"
        data-section-id="{{.Item.SectionID}}"
        data-uncertain="{{.Item.Uncertain}}"
        @click="$dispatch('open-mobile-action', {
            id: parseInt($el.dataset.itemId),
            name: $el.dataset.itemName,
            description: $el.dataset.itemDescription,
            quantity: parseInt($el.dataset.itemQuantity) || 0,
            section_id: parseInt($el.dataset.sectionId),
            uncertain: $el.dataset.uncertain === 'true'
        })"
        class="md:hidden p-2 rounded-lg text-stone-400 dark:text-stone-500 hover:bg-stone-100 dark:hover:bg-stone-700"
    >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path>
        </svg>
    </button>

    <!-- Drag Handle - keep visible but transparent during edit to maintain spacing -->
    <div 
        class="drag-handle flex-shrink-0 w-8 h-10 flex items-center justify-center -mr-2 touch-none cursor-grab active:cursor-grabbing text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-400 transition-colors"
        :class="$data.inlineEditingItemId === {{.Item.ID}} && 'opacity-0 pointer-events-none'"
    >
        <svg class="w-5 h-6" fill="currentColor" viewBox="0 0 24 24">
            <circle cx="9" cy="5" r="2"/>
            <circle cx="15" cy="5" r="2"/>
            <circle cx="9" cy="12" r="2"/>
            <circle cx="15" cy="12" r="2"/>
            <circle cx="9" cy="19" r="2"/>
            <circle cx="15" cy="19" r="2"/>
        </svg>
    </div>
</div>
{{end}}
