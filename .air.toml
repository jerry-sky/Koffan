root = "."
tmp_dir = "tmp"

[build]
cmd = "CGO_ENABLED=1 go build -o ./tmp/main ."
bin = "tmp/main"
entrypoint = ["./tmp/main"]
include_ext = ["go", "tpl", "tmpl", "html", "js", "css", "json"]
exclude_dir = ["tmp", "vendor"]
poll = true
poll_interval = 500
stop_on_error = false

[misc]
clean_on_exit = false
